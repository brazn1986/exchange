server:
  port: 8383

app:
  price:
    expiration:
      time-min: 1
  scheduled:
    order:
      complete-min: 1
      fixed-rate: 5000

spring:
  application.name: exchange
  datasource:
    url: "jdbc:postgresql://localhost:5432/exchange"
    username: "flowable"
    password: "flowable"
    driver-class-name: "org.postgresql.Driver"
  jpa:
    hibernate:
      ddl-auto: create
      show-sql: true
    properties:
      hibernate.format_sql: true
      globally_quoted_identifiers: true
    show-sql: true
springdoc:
  swagger-ui:
    path: /swagger-ui.html